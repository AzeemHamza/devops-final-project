name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/frontend
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies and test
        working-directory: ./backend
        run: |
          npm install
          npm test

      - name: Install frontend dependencies and test
        working-directory: ./frontend
        run: |
          npm install
                    npm test -- --watchAll=false --passWithNoTests

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_IMAGE_BACKEND }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE_FRONTEND }}:latest

